name: Build and Package Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Build Extension
        run: npm run build

      - name: Prepare ZIP Contents
        run: |
          mkdir -p Find_Your_Assets
          cp -r CSXS Find_Your_Assets/
          cp -r host Find_Your_Assets/
          cp -r dist Find_Your_Assets/
          cp INSTALL.txt Find_Your_Assets/
          cp .debug Find_Your_Assets/ || true

      - name: Create ZIP
        run: |
          cd Find_Your_Assets
          zip -r ../Find_Your_Assets_Latest.zip ./* .debug || zip -r ../Find_Your_Assets_Latest.zip ./*

      - name: Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Version
          body: "Automatically built from main branch. Download the ZIP below."
          files: Find_Your_Assets_Latest.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
